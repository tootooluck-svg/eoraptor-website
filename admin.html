<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eoraptor Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1a; color: #fff;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem; padding: 2rem; width: 100%; max-width: 400px;
        }
        .login-box h1 { text-align: center; color: #00e19b; margin-bottom: 1.5rem; }
        input {
            width: 100%; padding: 1rem; margin-bottom: 1rem;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0.5rem; color: #fff;
        }
        button {
            width: 100%; padding: 1rem; background: #00e19b; color: #0a0f1a;
            border: none; border-radius: 0.5rem; font-weight: bold; cursor: pointer;
        }
        .admin-panel { display: none; padding: 2rem; }
        .admin-panel h2 { color: #00e19b; margin-bottom: 1rem; }
        .tab { display: inline-block; padding: 0.5rem 1rem; background: rgba(255,255,255,0.1); margin-right: 0.5rem; cursor: pointer; }
        .tab.active { background: #00e19b; color: #0a0f1a; }
    </style>
</head>
<body>
    <div class="login-box" id="loginBox">
        <h1>🔐 后台管理</h1>
        <input type="password" id="password" placeholder="请输入密码">
        <button onclick="login()">登录</button>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h2>Eoraptor 后台管理</h2>
        <div>
            <span class="tab active">Hero区域</span>
            <span class="tab">功能特性</span>
            <span class="tab">图片管理</span>
        </div>
        <div style="margin-top:2rem">
            <p>后台管理功能开发中... </p>
            <button onclick="logout()" style="width:auto;margin-top:1rem">退出登录</button>
        </div>
    </div>

    <script>
        function login() {
            if (document.getElementById('password').value === 'admin123') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                alert('密码错误');
            }
        }
        function logout() {
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
